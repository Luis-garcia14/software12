<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso - EJARAD TIC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e293b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card-recovery { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .error-anuncio { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; border: 1px solid #f5c6cb; text-align: center; }
    </style>
</head>
<body>
    <div class="card-recovery">
        <div class="text-center mb-4">
            <i class="bi bi-patch-exclamation text-success" style="font-size: 3.5rem;"></i>
            <h3 class="fw-bold text-dark mt-2 mb-1">Recuperar Cuenta</h3>
            <p class="text-muted small">Verificación de Identidad de Seguridad</p>
        </div>

        <div id="anuncio" class="error-anuncio fw-semibold">
            <i class="bi bi-x-circle-fill me-1"></i> Código Incorrecto. Intente nuevamente.
        </div>
        
        <div id="fase-correo">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Correo del Operador</label>
                <input type="email" id="mail" class="form-control" placeholder="ejemplo@correo.com">
            </div>
            <button class="btn btn-success w-100 fw-bold py-2.5 shadow-sm" onclick="solicitarCodigo()">
                Enviar Token de Acceso
            </button>
        </div>

        <div id="fase-codigo" style="display: none;">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Código Recibido (6 dígitos)</label>
                <input type="text" id="cod" class="form-control text-center font-monospace fw-bold fs-4" maxlength="6" placeholder="000000">
            </div>
            <button class="btn btn-primary w-100 fw-bold py-2.5 shadow-sm" onclick="validar()">
                Validar Código
            </button>
        </div>

        <div class="text-center mt-3">
            <a href="/login_operador" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Cancelar y Volver</a>
        </div>
    </div>

    <script>
        async function solicitarCodigo() {
            const correoInput = document.getElementById('mail').value.trim();
            if (!correoInput) {
                alert("Por favor, ingresa tu correo electrónico.");
                return;
            }

            try {
                const res = await fetch('/api/solicitar_recuperacion', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo: correoInput })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message || "Código enviado con éxito a tu bandeja.");
                    localStorage.setItem('reset_mail', correoInput);
                    document.getElementById('fase-correo').style.display = 'none';
                    document.getElementById('fase-codigo').style.display = 'block';
                } else {
                    alert(data.message || "El correo ingresado no pertenece a ningún operador.");
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        }

        async function validar() {
            const correo = localStorage.getItem('reset_mail');
            const codigo = document.getElementById('cod').value.trim();
            const anuncioError = document.getElementById('anuncio');

            if (!codigo) {
                alert("Debes ingresar el código de 6 dígitos.");
                return;
            }

            anuncioError.style.display = 'none';

            try {
                const res = await fetch('/api/validar_codigo_recuperacion', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo, codigo })
                });

                if (res.ok) {
                    window.location.href = '/cambiar_password';
                } else {
                    anuncioError.style.display = 'block';
                }
            } catch (error) {
                alert("Error al validar el código en el sistema.");
            }
        }
    </script>
</body>
</html>
