<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Vehicular - EJARAD TIC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: white; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0; 
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        .btn-custom {
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-operator {
            background-color: #3b82f6;
            color: white;
            border: none;
        }
        .btn-operator:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
        .btn-admin {
            background-color: #10b981;
            color: white;
            border: none;
        }
        .btn-admin:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="main-card text-center">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-info" style="font-size: 4rem;"></i>
        </div>
        <h1 class="fw-bold mb-2 fs-2">Control Vehicular</h1>
        <p class="text-white-50 mb-4">EJARAD TIC SOLUCIONES</p>
        
        <div class="d-grid gap-3">
            <a href="/login_operador" class="btn btn-custom btn-operator shadow-sm">
                <i class="bi bi-person-workspace me-2"></i> ACCESO OPERADOR
            </a>
            <a href="/login_admin" class="btn btn-custom btn-admin shadow-sm">
                <i class="bi bi-suit-spade-fill me-2"></i> ACCESO ADMINISTRADOR
            </a>
        </div>
    </div>
</body>
</html>
