<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #14522d; /* Verde oscuro original */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        h2 { 
            color: #14522d; 
            font-weight: bold; 
        }

        /* BLOQUEO DE COLOR DE AUTOCOMPLETADO DEL NAVEGADOR */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #334155 !important;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>
    <div class="card text-center">
        <i class="bi bi-shield-lock-fill" style="font-size: 3.5rem; color: #14522d;"></i>
        <h2 class="mt-2 mb-4">Acceso Maestro</h2>
        
        <form id="form-login-admin" onsubmit="event.preventDefault(); entrarPanel();" autocomplete="off">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-secondary">Correo del Administrador</label>
                <input type="email" id="correo" class="form-control py-2" placeholder="admin@ejarad.com" autocomplete="new-password" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-secondary">Contraseña Maestra</label>
                <input type="password" id="password" class="form-control py-2" placeholder="••••••••" autocomplete="new-password" required>
            </div>
            
            <button type="submit" class="btn fw-bold w-100 py-2.5 text-white mb-3 shadow-sm" style="background-color: #14522d;">
                <i class="bi bi-unlock-fill me-1"></i> INGRESAR AL PANEL
            </button>
        </form>

        <a href="/" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
    </div>

    <script>
        // Aseguramos cajas vacías al cargar el DOM
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('correo').value = "";
            document.getElementById('password').value = "";
        });

        async function entrarPanel() {
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;

            if (!correo || !password) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            try {
                const res = await fetch('/api/login_admin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('nombre_usuario', data.nombre);
                    localStorage.setItem('rolUsuario', data.rol);
                    window.location.href = '/panel_admin';
                } else {
                    alert(data.message || "Credenciales de administrador incorrectas");
                }
            } catch (error) {
                console.error("Error en la conexión:", error);
                alert("Error de conexión: Verifica que el servidor Flask esté encendido.");
            }
        }
    </script>
</body>
</html>
