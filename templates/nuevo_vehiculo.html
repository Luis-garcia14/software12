<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJARAD TIC - Registrar Vehículo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card-registro { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: 40px auto; }
        .header-registro { background-color: #0f172a; color: white; border-top-left-radius: 16px; border-top-right-radius: 16px; padding: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="card card-registro shadow">
        <div class="header-registro">
            <i class="bi bi-car-front text-info fs-1"></i>
            <h3 class="m-0 fw-bold mt-2">Registro de Vehículo</h3>
            <small class="text-white-50">Ingreso Manual al Inventario General</small>
        </div>
        
        <div class="card-body p-4">
            <div id="alerta-error" class="alert alert-danger" style="display: none;"></div>
            
            <form id="form-nuevo-vehiculo" onsubmit="guardarVehiculo(event)">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Matrícula / Placa</label>
                    <input type="text" id="placa" class="form-control text-uppercase fw-bold" placeholder="Ej. ABC123" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Nombre Completo del Propietario</label>
                    <input type="text" id="propietario" class="form-control" placeholder="Ej. Juan Pérez" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">DNI del Propietario</label>
                    <input type="text" id="dni_propietario" class="form-control" maxlength="8" placeholder="8 dígitos numéricos" required>
                </div>
                
                <div class="row g-3">
                    <div class="col-md-4 mb-3">
                        <label class="form-label small fw-bold text-secondary">Marca</label>
                        <input type="text" id="marca" class="form-control" placeholder="Ej. Toyota" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label small fw-bold text-secondary">Modelo</label>
                        <input type="text" id="modelo" class="form-control" placeholder="Ej. Yaris" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label small fw-bold text-secondary">Color</label>
                        <input type="text" id="color" class="form-control" placeholder="Ej. Negro" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Tipo de Vehículo</label>
                    <select id="tipo_vehiculo" class="form-select" required>
                        <option value="" disabled selected>Seleccione el tipo</option>
                        <option value="Auto">Auto</option>
                        <option value="Camioneta">Camioneta</option>
                        <option value="Motocicleta">Motocicleta</option>
                        <option value="SUV">SUV</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a href="/inventario_operador" class="btn btn-light border btn-sm px-3 fw-semibold">Cancelar</a>
                    <button type="submit" class="btn btn-dark btn-sm px-4 fw-bold text-info">💾 Registrar Vehículo</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function guardarVehiculo(event) {
            event.preventDefault();
            const alerta = document.getElementById('alerta-error');
            alerta.style.display = "none";

            const placaInput = document.getElementById('placa').value.trim().toUpperCase();
            const propietario = document.getElementById('propietario').value.trim();
            const dni_propietario = document.getElementById('dni_propietario').value.trim();
            const marca = document.getElementById('marca').value.trim();
            const modelo = document.getElementById('modelo').value.trim();
            const color = document.getElementById('color').value.trim();
            const tipo_vehiculo = document.getElementById('tipo_vehiculo').value;

            if (dni_propietario.length !== 8 || isNaN(dni_propietario)) {
                alerta.innerText = "El DNI del propietario debe tener exactamente 8 números.";
                alerta.style.display = "block";
                return;
            }

            try {
                const res = await fetch('/api/registrar_vehiculo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        placa: placaInput,
                        propietario: propietario,
                        dni_propietario: dni_propietario,
                        marca: marca,
                        modelo: modelo,
                        color: color,
                        tipo_vehiculo: tipo_vehiculo
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message);
                    window.location.href = '/inventario_operador';
                } else {
                    alerta.innerText = data.message;
                    alerta.style.display = "block";
                }

            } catch (error) {
                alerta.innerText = "Error de conexión con el servidor Flask.";
                alerta.style.display = "block";
            }
        }
    </script>
</body>
</html>
