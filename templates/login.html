<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Operador - EJARAD TIC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1e293b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        
        /* BLOQUEO DE COLOR DE AUTOCOMPLETADO DEL NAVEGADOR */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #334155 !important;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-badge-fill text-primary" style="font-size: 3.5rem;"></i>
            <h3 class="fw-bold text-dark mt-2 mb-1">Ingreso Operador</h3>
            <p class="text-muted small">Sistema de Control de Vehículos</p>
        </div>
        
        <form id="form-login-operador" onsubmit="event.preventDefault(); entrarPanel();" autocomplete="off">
            
            <input type="text" name="fake_email_remember" style="display:none;" />
            <input type="password" name="fake_password_remember" style="display:none;" />

            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope-fill"></i></span>
                    <input type="text" id="correo" class="form-control" placeholder="operador@ejarad.com" autocomplete="off" onfocus="this.type='email'" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
                </div>
            </div>

            <div class="text-end mb-4">
                <a href="/recuperar" class="text-decoration-none small text-primary fw-semibold">¿Olvidaste tu contraseña?</a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 mb-3 shadow-sm">
                <i class="bi bi-box-arrow-in-right me-1"></i> INICIAR SESIÓN
            </button>
        </form>
        
        <div class="text-center">
            <a href="/" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Volver al Inicio</a>
        </div>
    </div>

    <script>
        // TRUCO CRÍTICO 4: Bucle cíclico preventivo durante el primer segundo de carga
        document.addEventListener("DOMContentLoaded", () => {
            const inputCorreo = document.getElementById('correo');
            const inputPass = document.getElementById('password');

            // Limpieza inmediata en ráfaga (limpia cada 50ms durante el arranque)
            let contador = 0;
            const intervaloLimpieza = setInterval(() => {
                if (inputCorreo) inputCorreo.value = "";
                if (inputPass) inputPass.value = "";
                
                contador++;
                if (contador > 15) { // Se detiene tras 750 milisegundos
                    clearInterval(intervaloLimpieza);
                }
            }, 50);
        });

        async function entrarPanel() {
            const correo = document.getElementById('correo').value.trim();
            const password = document.getElementById('password').value;

            if (!correo || !password) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('nombre_usuario', data.nombre); 
                    localStorage.setItem('rolUsuario', data.rol); 
                    
                    setTimeout(() => {
                        window.location.href = '/panel_operador';
                    }, 150);

                } else {
                    alert(data.message || "Credenciales incorrectas");
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        }
    </script>
</body>
</html>
