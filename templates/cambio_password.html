<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establecer Nueva Contraseña - EJARAD TIC</title>
    <link class="editor-safe" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link class="editor-safe" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1e293b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .card-reset { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

    <div class="card-reset">
        <div class="text-center mb-4">
            <i class="bi bi-key text-warning" style="font-size: 3.5rem;"></i>
            <h3 class="fw-bold text-dark mt-2 mb-1">Nueva Contraseña</h3>
            <p class="text-muted small">Actualización de seguridad obligatoria</p>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Escribe la nueva contraseña</label>
            <input type="password" id="pass1" class="form-control" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">Confirma tu contraseña</label>
            <input type="password" id="pass2" class="form-control" placeholder="Repite la contraseña" autocomplete="new-password">
        </div>
        
        <button class="btn btn-warning w-100 fw-bold py-2.5 text-dark mb-3 shadow-sm" onclick="actualizarPassword()">
            <i class="bi bi-check-circle-fill me-1"></i> ACTUALIZAR CONTRASEÑA
        </button>
        
        <div class="text-center">
            <a href="/login_operador" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Cancelar y Volver</a>
        </div>
    </div>

    <script>
        async function actualizarPassword() {
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;
            const correo = localStorage.getItem('reset_mail');

            if (!correo) {
                alert("La sesión de recuperación ha expirado. Por favor, solicita un nuevo código.");
                window.location.href = '/recuperar';
                return;
            }

            if (pass1 !== pass2) {
                alert("Las contraseñas ingresadas no coinciden.");
                return;
            }

            if (pass1.length < 4) {
                alert("Por motivos de seguridad, la contraseña debe contener al menos 4 caracteres.");
                return;
            }

            try {
                const res = await fetch('/api/actualizar_password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ correo, password: pass1 })
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.message || "Contraseña restablecida con éxito.");
                    localStorage.removeItem('reset_mail');
                    window.location.href = '/login_operador';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert("Error de conexión con el servidor Flask.");
            }
        }
    </script>
</body>
</html>
